name: push and pull request 
on: 
    push:
        branches:
            - main
        paths:
            - "src/**"
    pull_request:
        branches:
            - main
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6.0.2
            
            - name: run test 
              run: npm test
