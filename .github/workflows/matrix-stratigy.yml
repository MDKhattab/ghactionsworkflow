name: stratigy and matrix in github actions
on:
    workflow_dispatch:

jobs:
    stratigy_job:
        strategy:
            fail-fast: false  # this will allow all jobs to run even if one of them fails
            max-parallel: 3  # this will limit the number of jobs that can run in parallel to 3
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                node_version: [14, 16, 18]
        runs-on: ${{ matrix.os }}
        steps:
            - name: use node version
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: ${{ matrix.node_version }}
